name: Regenerate Generated Documentation

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-docs:
    name: Regenerate generated documentation and open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build generated documentation
        shell: pwsh
        run: ./scripts/build-docs.ps1 -Configuration Release

      - name: Create generated docs pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: docs/generated-reference-update
          delete-branch: true
          title: Update generated PhotoArchive documentation
          commit-message: Update generated documentation
          body: |
            This PR updates generated PhotoArchive reference documentation.

            Generated by the manual `Regenerate Generated Documentation` workflow using xml2doc.

            Scope:
            - docs/PhotoArchive/generated/PhotoArchive.Api.md
            - docs/PhotoArchive/generated/PhotoArchive.Core.md
            - docs/PhotoArchive/generated/PhotoArchive.Data.md
            - docs/PhotoArchive/generated/PhotoArchive.Tools.md

            No application behavior changes are included.
          add-paths: |
            docs/PhotoArchive/generated/*.md
